<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>خوانا</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --bg-alt: #111827;
        --accent: #22c55e;
        --accent-soft: rgba(34, 197, 94, 0.12);
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: rgba(148, 163, 184, 0.35);
        --danger: #f97373;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 14px 16px 16px;
        width: 260px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at top, #111827 0, #020617 50%);
        color: var(--text);
      }

      .card {
        border-radius: 14px;
        border: 1px solid var(--border);
        background: linear-gradient(145deg, #020617, #020617, #020617);
        padding: 12px 14px 10px;
        box-shadow: 0 22px 55px rgba(15, 23, 42, 0.8);
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .title-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-dot {
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: conic-gradient(
          from 210deg,
          #22c55e,
          #a855f7,
          #22c55e,
          #22c55e
        );
        padding: 2px;
      }

      .logo-inner {
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: radial-gradient(circle at 30% 20%, #bbf7d0, #15803d);
      }

      .title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .subtitle {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        padding: 4px 8px;
        border-radius: 9999px;
        background: var(--accent-soft);
        color: #bbf7d0;
      }

      .pill-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.3);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 8px;
      }

      .label-text {
        font-size: 12px;
      }

      .label-helper {
        font-size: 10px;
        color: var(--muted);
      }

      /* Toggle */
      .toggle {
        position: relative;
        width: 46px;
        height: 24px;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: #020617;
        border-radius: 999px;
        border: 1px solid var(--border);
        transition: all 0.2s ease;
        box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.7);
      }

      .slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        top: 50%;
        transform: translateY(-50%);
        background: radial-gradient(circle at 30% 20%, #f9fafb, #d1d5db);
        border-radius: 50%;
        box-shadow:
          0 6px 10px rgba(15, 23, 42, 0.85),
          0 0 0 1px rgba(148, 163, 184, 0.8);
        transition: all 0.2s ease;
      }

      input:checked + .slider {
        background: radial-gradient(circle at 10% 0, #22c55e, #15803d);
        border-color: rgba(34, 197, 94, 0.75);
        box-shadow:
          0 0 0 1px rgba(34, 197, 94, 0.4),
          0 18px 40px rgba(22, 163, 74, 0.5);
      }

      input:checked + .slider::before {
        transform: translate(19px, -50%);
        box-shadow:
          0 6px 12px rgba(15, 23, 42, 0.9),
          0 0 0 1px rgba(220, 252, 231, 0.95);
      }

      .small {
        margin-top: 8px;
        font-size: 10px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
      }

      .small span:last-child {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="title-wrap">
          <div class="logo-dot">
            <div class="logo-inner"></div>
          </div>
          <div>
            <div class="title">خوانا</div>
            <div class="subtitle">فونت Vazirmatn برای تمام متن‌های فارسی</div>
          </div>
        </div>
        <div class="pill">
          <span class="pill-dot"></span>
          <span id="status-label">فعال</span>
        </div>
      </div>

      <div class="row">
        <div>
          <div class="label-text">اعمال فونت سراسری</div>
          <div class="label-helper">استفاده از Vazirmatn فقط روی :lang(fa)</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="enabled-toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="row" style="margin-top: 10px;">
        <div>
          <div class="label-text">راست‌چین کردن این سایت</div>
          <div class="label-helper">تغییر جهت صفحه (dir) فقط برای این دامنه</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="site-force-rtl-toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="small">
        <span>فونت صفحات انگلیسی دست‌نخورده می‌ماند.</span>
        <span>تنظیمات → تنظیمات پیش‌فرض و راست‌چین سراسری</span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
